    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc; 
            color: #334155; 
            line-height: 1.8; 
        }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0, 1, 0, 1);
        }
        .unit-card.active .accordion-content {
            max-height: 10000px;
            padding-bottom: 2.5rem;
        }
        .unit-card.active .chevron {
            transform: rotate(180deg);
        }
        .phase-card { @apply bg-white p-6 rounded-2xl border border-slate-100 mb-6 shadow-sm; }
        .phase-title { @apply flex items-center gap-3 mb-4 font-black text-lg; }
        .step-tag { @apply px-2 py-1 rounded text-xs font-bold uppercase tracking-wider; }
        
        .tip-box { @apply bg-amber-50 border-l-4 border-amber-400 p-4 mt-4 text-sm text-amber-900 rounded-r-lg; }
        .dialogue-text { @apply pl-4 border-l-2 border-indigo-200 text-indigo-700 font-medium my-2; }
        .action-highlight { @apply text-rose-600 font-bold; }
        
        .bg-phase-1 { @apply bg-amber-100 text-amber-700; }
        .bg-phase-2 { @apply bg-sky-100 text-sky-700; }
        .bg-phase-3 { @apply bg-emerald-100 text-emerald-700; }
        .bg-phase-4 { @apply bg-indigo-100 text-indigo-700; }
    </style>

                p2: { title: "蓋大房子", time: "3 min", desc: "拿出三塊大積木。爸爸放一塊，媽媽放一塊，寶寶放一塊。", action: "「你看，我們疊在一起，就變成一棟高高的房子了！耶穌把我們黏在一起！」", dialogue: "「少一塊積木會不會倒掉？（會！大家都要在一起！）」" },
                p3: { title: "全家蓋手印", time: "5 min", desc: "準備一張大紙。", action: "爸爸的大手、媽媽的手、孩子的小手，全部疊在紙上畫出輪廓。「這是我們一家人的手喔！」", tip: "視覺化「家庭」這個概念。" },
                p4: { title: "手疊手禱告", time: "1 min", desc: "大家的手疊在一起（像球隊加油那樣）。", dialogue: "「相親相愛（跟唸），永遠在一起（跟唸）。阿們！」", tip: "禱告完大家一起把手往上舉喊「耶！」" }
            },
            {
                id: 12, title: "找到小羊了！", theme: "關懷與找尋", scripture: "路加福音 15:6", color: "bg-red-500",
                p1: { title: "綿羊咩咩叫", time: "2 min", desc: "大家一起在地上爬，模仿綿羊叫：「咩～咩～」。", action: "互相用頭輕輕頂來頂去（小羊打招呼）。", tip: "動物模仿是2-4歲幼兒最容易投入的遊戲。" },
                p2: { title: "小羊不見了", time: "3 min", desc: "講故事：「有一隻小羊跑太遠，迷路了！牧羊人好著急，到處找：小羊你在哪裡？」", action: "爸媽假裝看不到孩子：「哎呀！我的小羊呢？」然後抱住孩子：「找到了！」", dialogue: "" },
                p3: { title: "室內尋寶", time: "5 min", desc: "拿一隻絨毛娃娃（羊或狗）藏在沙發上或抱枕下（露出尾巴或腳讓孩子好找）。", action: "「快去把小羊找回來！」孩子找到時，全家大聲拍手歡呼。", tip: "客體恆存概念的遊戲（知道東西不見了其實還在）。" },
                p4: { title: "扛在肩上禱告", time: "1 min", desc: "爸爸把孩子扛在肩膀上（或抱高）。", dialogue: "「找到小羊（跟唸），好開心（跟唸）。謝謝耶穌找我（跟唸）。阿們！」", tip: "" }
            },
            {
                id: 13, title: "抱緊緊不放開", theme: "與神連結", scripture: "約翰福音 15:5", color: "bg-green-600",
                p1: { title: "無尾熊抱樹", time: "2 min", desc: "爸爸或媽媽站著當作大樹。孩子當無尾熊。", action: "孩子要用力抱住大人的大腿。「抱緊緊喔！大樹要走路囉！」帶著孩子走兩步。", tip: "透過肢體攀附體驗「連結」的概念。" },
                p2: { title: "小葡萄要喝水", time: "3 min", desc: "拿出一顆葡萄或水果。講故事：「小葡萄要黏在大樹枝上，才可以喝水長大。如果掉下來，就扁掉了。」", action: "「耶穌是大葡萄樹，我們是小葡萄，要緊緊黏著耶穌喔！」", dialogue: "" },
                p3: { title: "黏土小葡萄", time: "5 min", desc: "用綠色或紫色的無毒黏土，揉成幾顆小圓球。", action: "讓孩子把小圓球用力「黏」在一張畫了樹枝的紙上。「黏緊緊！不會掉！」", tip: "揉捏黏土可以訓練幼兒的小肌肉。" },
                p4: { title: "抱抱禱告", time: "1 min", desc: "大人將孩子抱在懷裡。", dialogue: "「我是小葡萄（跟唸），抱緊耶穌（跟唸）。阿們！」", tip: "" }
            },
            {
                id: 14, title: "鹹鹹的，亮亮的！", theme: "影響力", scripture: "馬太福音 5:13", color: "bg-blue-400",
                p1: { title: "鹹鹹吃一口", time: "2 min", desc: "準備一小口沒有味道的水煮蛋/飯，和一小口沾了微量鹽巴的。", action: "讓孩子嚐嚐看有加鹽的。「哇！有一點點鹹鹹的，比較好吃對不對？」", tip: "用味蕾直接體會鹽巴的作用。" },
                p2: { title: "鹽巴小超人", time: "3 min", desc: "講故事：「鹽巴雖然小小顆的，但可以讓東西變好吃！耶穌說我們也是小鹽巴喔！」", action: "「你可以讓別人笑嘻嘻，就像加了鹽巴一樣好棒！」", dialogue: "「我們去逗阿公阿嬤笑，當開心的小鹽巴好不好？」" },
                p3: { title: "仙女棒/手電筒", time: "5 min", desc: "拿一隻會發光的螢光棒或小燈籠。", action: "在暗暗的房間裡揮舞畫圈圈。「你看，光好漂亮！我們是亮亮的燈！」", tip: "視覺追視與光影刺激。" },
                p4: { title: "點點額頭禱告", time: "1 min", desc: "爸媽輕輕點一下孩子的額頭（像點燈一樣）。", dialogue: "「我是小燈泡（跟唸），發出亮光（跟唸）。阿們！」", tip: "" }
            },
            {
                id: 15, title: "最堅固的大石頭", theme: "順服神的話", scripture: "馬太福音 7:24", color: "bg-stone-500",
                p1: { title: "推不倒的不倒翁", time: "2 min", desc: "如果家裡有不倒翁玩具，讓孩子去推；或者爸媽盤腿坐穩，讓孩子來推。", action: "「哎呀！推不倒！好堅固喔！」", tip: "體驗「穩固」的物理感覺。" },
                p2: { title: "沙子與石頭", time: "3 min", desc: "講故事：「如果在軟軟的沙子上蓋房子，雨來了嘩啦啦，房子就『砰』倒了。在硬硬石頭上蓋的就不會倒！」", action: "爸媽跟孩子一起用力跺腳，感受地板的硬度。「這就是大石頭！」", dialogue: "" },
                p3: { title: "疊高高不倒", time: "5 min", desc: "準備幾個大積木。第一次疊在軟枕頭上（倒掉）。", action: "第二次疊在硬地板上（疊很高）。「耶！聽耶穌的話，就像疊在硬地板上，好棒！」", tip: "對照實驗非常吸引幼兒，反覆倒塌和重建是他們最喜歡的遊戲。" },
                p4: { title: "跺腳腳禱告", time: "1 min", desc: "全家一起手牽手跺腳三下。", dialogue: "「聽耶穌的話（跟唸），房子不倒塌（跟唸）。阿們！」", tip: "" }
            },
            {
                id: 16, title: "毛毛蟲變蝴蝶", theme: "生命改變", scripture: "哥林多後書 5:17", color: "bg-lime-500",
                p1: { title: "毛毛蟲爬爬", time: "2 min", desc: "全家一起趴在地板上，肚子貼地蠕動前進。", action: "「我們是毛毛蟲，慢慢爬～慢慢爬～」", tip: "腹爬能促進幼兒的感覺統合與大腦發展。" },
                p2: { title: "睡覺變成蛹", time: "3 min", desc: "拿一條小毯子把孩子捲起來（像壽司/蛹一樣）。", action: "「毛毛蟲睡著了，耶穌給他施魔法！1、2、3，打開！」", dialogue: "" },
                p3: { title: "蝴蝶飛呀飛", time: "5 min", desc: "把毯子打開後，讓孩子張開雙手像翅膀一樣在客廳跑。", action: "「變成漂亮的新蝴蝶了！飛呀飛！」可以放一首輕快的蝴蝶兒歌。", tip: "從束縛到釋放的肢體動作，能帶給幼兒極大的快樂。" },
                p4: { title: "摸摸肩膀禱告", time: "1 min", desc: "假裝給孩子裝上隱形的翅膀（摸摸肩胛骨）。", dialogue: "「耶穌愛我（跟唸），變成新蝴蝶（跟唸），好漂亮（跟唸）。阿們！」", tip: "" }
            },
            {
                id: 17, title: "亮晶晶的寶物", theme: "我們有耶穌", scripture: "哥林多後書 4:7", color: "bg-amber-600",
                p1: { title: "打開驚喜盒", time: "2 min", desc: "準備一個普通或舊的紙盒，裡面放一個會發光或很漂亮的玩具。", action: "讓孩子打開。「哇！盒子醜醜的，但裡面有寶貝耶！」", tip: "拆禮物/開盒子的期待感能抓住幼兒注意力。" },
                p2: { title: "我就是小盒子", time: "3 min", desc: "講故事：「我們就像這個盒子，有時候會哭哭、會跌倒受傷。可是耶穌住在我們裡面喔！」", action: "輕輕敲敲孩子的肚子或胸口：「叩叩叩，耶穌在裡面嗎？在喔！」", dialogue: "「耶穌在你裡面陪你嗎？（點頭）」" },
                p3: { title: "裝飾小杯子", time: "5 min", desc: "給孩子一個普通的紙杯，讓他用彩色筆或貼紙裝飾外面。", action: "然後在杯子裡面放一顆糖果或小閃亮貼紙。「你也是裝著寶物的杯子喔！」", tip: "簡單勞作，成品可以讓孩子拿在手上玩。" },
                p4: { title: "抱著肚子禱告", time: "1 min", desc: "讓孩子雙手抱著自己的小肚子。", dialogue: "「我是小盒子（跟唸），耶穌住裡面（跟唸）。阿們！」", tip: "" }
            },
            {
                id: 18, title: "戴上小皇冠", theme: "神兒女的身分", scripture: "約翰一書 3:1", color: "bg-purple-500",
                p1: { title: "紙膠帶走直線", time: "2 min", desc: "在地上貼一條紙膠帶。讓孩子試著踩在線上走。", action: "「我們要走得直直的、慢慢的，像小王子/小公主一樣喔！」", tip: "平衡感訓練，同時帶入「尊貴身分」的肢體語言。" },
                p2: { title: "天父是國王", time: "3 min", desc: "講故事：「天父是最大的國王喔！你是天父的寶貝，所以你就是最棒的小公主/小王子！」", action: "爸媽假裝吹喇叭：「叭叭叭～小王子來囉！」", dialogue: "" },
                p3: { title: "戴皇冠", time: "5 min", desc: "用一條紙條黏成一個簡單的頭圈（皇冠），戴在孩子頭上。", action: "全家一起為孩子拍手：「哇！好可愛的王子/公主！」帶他去照鏡子。", tip: "角色扮演是2-4歲非常重要的學習方式。" },
                p4: { title: "摸摸頭頂禱告", time: "1 min", desc: "爸媽的手輕輕放在孩子戴著皇冠的頭頂上。", dialogue: "「天父是國王（跟唸），我是小寶貝（跟唸）。阿們！」", tip: "" }
            },
            {
                id: 19, title: "一步一步往前走", theme: "耐心與堅持", scripture: "希伯來書 12:1", color: "bg-orange-600",
                p1: { title: "烏龜慢慢爬", time: "2 min", desc: "背上放一個小枕頭當烏龜殼。", action: "「我們當小烏龜，雖然走得很慢，但我們不放棄喔！一步一步走！」", tip: "透過角色扮演讓「慢」和「堅持」變得有趣。" },
                p2: { title: "耶穌牽著手", time: "3 min", desc: "講故事：「有時候走路好累好累，想哭哭。耶穌說：來，我牽你的手走！」", action: "爸媽牽起孩子的雙手，輕輕拉著他往前走兩步。", dialogue: "「累累的時候，耶穌會牽你喔！」" },
                p3: { title: "跳過小水窪", time: "5 min", desc: "在地板上放幾張紙（當作石頭）。", action: "讓孩子踩著紙跳過去。「加油！快到終點了！跳！」到終點時給一個大擁抱。", tip: "大肢體跳躍訓練，同時體驗「達到終點」的成就感。" },
                p4: { title: "揉揉小腳禱告", time: "1 min", desc: "讓孩子坐著，爸媽幫他輕輕揉揉小腿和小腳丫。", dialogue: "「小腳丫好棒（跟唸），耶穌陪我走（跟唸）。阿們！」", tip: "" }
            },
            {
                id: 20, title: "敲敲門，請進！", theme: "接待與愛心", scripture: "啟示錄 3:20", color: "bg-pink-600",
                p1: { title: "叩叩叩！是誰呀？", time: "2 min", desc: "爸媽躲在門後或紙箱後，敲敲門：「叩叩叩！」", action: "孩子跑去打開：「是爸爸/媽媽！」重複幾次，幼兒百玩不膩。", tip: "捉迷藏變體，訓練聽覺方位感。" },
                p2: { title: "歡迎耶穌", time: "3 min", desc: "講故事：「耶穌也在敲我們心裡的小門喔！叩叩叩！我們要把門打開說：耶穌請進！」", action: "爸媽輕輕敲孩子的心口：「叩叩叩！」孩子說：「請進！」", dialogue: "「耶穌進來陪你玩囉，開心嗎？」" },
                p3: { title: "請玩具喝茶", time: "5 min", desc: "準備幾個玩具杯子或小碗。讓孩子倒「空氣茶」給玩偶喝。", action: "「小熊來我們家玩，請他喝茶！好棒的招待喔！」", tip: "社交禮儀的早期啟蒙，透過扮家家酒練習接待。" },
                p4: { title: "打開雙手禱告", time: "1 min", desc: "帶領孩子把雙手像開門一樣打開。", dialogue: "「打開小門（跟唸），耶穌請進來（跟唸）。阿們！」", tip: "" }
            },
            {
                id: 21, title: "甜甜的好果子", theme: "好品格", scripture: "加拉太書 5:22", color: "bg-green-700",
                p1: { title: "吃好吃水果", time: "2 min", desc: "切幾塊香蕉、蘋果或葡萄。讓孩子自己拿著吃。", action: "「哇！水果好甜好好吃喔！吃下去心情真好！」", tip: "真實的味覺體驗是最直接的學習。" },
                p2: { title: "心裡長果子", time: "3 min", desc: "講故事：「聖靈在我們肚子裡面，也會長出甜甜的果子喔！叫做『開心果』、『抱抱果』。」", action: "摸摸孩子的肚子：「今天肚子裡有沒有長出開心果呀？（搔癢讓他笑）」", dialogue: "" },
                p3: { title: "採葡萄遊戲", time: "5 min", desc: "把幾張有顏色的圓形便條紙貼在牆上（高度剛好孩子可以墊腳撕下）。", action: "讓孩子去「採果子」，採下來放進小籃子裡。「採到好多好脾氣果子！」", tip: "伸展大肌肉與墊腳尖的平衡訓練。" },
                p4: { title: "摸摸肚子禱告", time: "1 min", desc: "爸媽的手放在孩子的肚子上輕揉。", dialogue: "「吃甜甜（跟唸），笑嘻嘻（跟唸），聖靈好愛我（跟唸）。阿們！」", tip: "" }
            },
            {
                id: 22, title: "穿上隱形盔甲", theme: "保護與安全", scripture: "以弗所書 6:11", color: "bg-slate-500",
                p1: { title: "戴帽子、穿襪子", time: "2 min", desc: "拿一頂帽子戴在孩子頭上，幫他穿上襪子。", action: "「帽子保護頭，襪子保護腳！準備出門囉！」", tip: "將抽象的軍裝連結到日常穿衣動作。" },
                p2: { title: "耶穌的保護衣", time: "3 min", desc: "講故事：「耶穌也給我們看不見的保護衣喔！穿上就不怕壞人！」", action: "假裝拿隱形的衣服幫孩子穿上。戴上隱形頭盔：「卡！」穿上隱形鞋子：「咚！」", dialogue: "「穿上了！現在你是超級小精兵了！」" },
                p3: { title: "擋住軟球球", time: "5 min", desc: "給孩子一個小抱枕當「盾牌」。爸媽丟軟軟的紙球或毛線球。", action: "讓孩子用抱枕擋住！「碰！擋住了！好厲害！」", tip: "手眼協調與反應力訓練，遊戲極具趣味性。" },
                p4: { title: "雙手交叉禱告", time: "1 min", desc: "讓孩子雙手交叉抱在胸前（保護的姿勢）。", dialogue: "「穿上盔甲（跟唸），耶穌保護我（跟唸）。阿們！」", tip: "" }
            },
            {
                id: 23, title: "大聲說：我愛耶穌", theme: "複習與宣告", scripture: "約翰一書 4:19", color: "bg-blue-700",
                p1: { title: "大聲小聲遊戲", time: "2 min", desc: "爸媽小聲說：「我愛你。」讓孩子用小聲學。", action: "爸媽大聲說：「我愛你！」讓孩子用大聲學。「喔！聲音好有精神！」", tip: "聲音控制遊戲，幫助幼兒了解音量調節。" },
                p2: { title: "耶穌先愛我們", time: "3 min", desc: "講故事：「耶穌給我們好多東西，給我們爸爸媽媽、給我們陽光。因為祂最愛我們了！」", action: "把孩子抱緊緊：「我們也要對耶穌說我愛祢！」", dialogue: "" },
                p3: { title: "畫一個大愛心", time: "5 min", desc: "在空中，爸媽帶著孩子的手，畫一個超級大的愛心形狀。", action: "然後用蠟筆在紙上亂塗（或一起畫一個愛心）。「這是給耶穌的愛心喔！」", tip: "大肢體的揮舞與手部塗鴉結合。" },
                p4: { title: "大聲讚美禱告", time: "1 min", desc: "大家一起舉起雙手看著天花板。", dialogue: "「一、二、三！耶穌，我愛祢！（大聲喊）」", tip: "充滿活力的結束。" }
            },
            {
                id: 24, title: "天國的開心派對", theme: "天堂與喜樂", scripture: "啟示錄 21:4", color: "bg-pink-400",
                p1: { title: "氣球飛高高", time: "2 min", desc: "吹一個氣球，往上拍，不讓它掉下來。", action: "「耶！好開心！像開派對一樣！」", tip: "視覺追蹤與全身協調運動。" },
                p2: { title: "耶穌的漂亮房子", time: "3 min", desc: "講故事：「以後我們要去耶穌家玩喔！那裡叫天國。那裡沒有人哭哭，每天都好開心、好漂亮！」", action: "「那裡有好多好吃的，還有好多動物可以抱抱！」", dialogue: "「你想去耶穌家開派對嗎？（想！）」" },
                p3: { title: "慶祝小點心", time: "5 min", desc: "拿出一個小杯子蛋糕、布丁或小零食，插上一根小蠟燭（或用假蠟燭）。", action: "全家一起拍手唱歌（唱一首歡樂的兒歌或詩歌）。「我們完成這24個遊戲了，好棒喔！」", tip: "儀式感！吃點心是最好的慶祝方式。" },
                p4: { title: "擊掌歡呼禱告", time: "1 min", desc: "全家一起舉起雙手擊掌（High Five）。", dialogue: "「謝謝耶穌（跟唸），天天好開心（跟唸），阿們！」", tip: "活動在最高潮與歡笑聲中完美結束。" }
            }
        ];

        const container = document.getElementById('units-container');

        unitsData.forEach(unit => {
            const card = document.createElement('div');
            card.className = 'unit-card bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden transition-all hover:shadow-md';
            card.innerHTML = `
                <button class="w-full text-left p-6 flex items-center justify-between focus:outline-none" onclick="toggleUnit(this.parentElement)">
                    <div class="flex items-center gap-5">
                        <div class="w-14 h-14 rounded-2xl ${unit.color} text-white flex items-center justify-center font-black text-2xl shadow-md border-4 border-white ring-2 ring-${unit.color.replace('bg-', '')}/30">
                            ${unit.id}
                        </div>
                        <div>
                            <h3 class="font-black text-xl text-slate-800">${unit.title}</h3>
                            <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mt-1">${unit.theme}</p>
                        </div>
                    </div>
                    <svg class="chevron w-6 h-6 text-slate-300 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>
                <div class="accordion-content px-6 bg-slate-50/50">
                    <div class="mb-6 mt-2">
                        <span class="bg-indigo-50 text-indigo-500 px-4 py-2 rounded-full font-bold text-sm border border-indigo-100">
                            📖 聖經小寶盒：${unit.scripture}
                        </span>
                    </div>

                    <div class="phase-card">
                        <div class="phase-title text-amber-600">
                            <span class="step-tag bg-phase-1">1. 玩樂暖身</span> ${unit.p1.title}
                            <span class="ml-auto text-xs font-bold text-amber-500 bg-amber-50 px-2 py-1 rounded-full">⏱️ ${unit.p1.time}</span>
                        </div>
                        <p class="text-slate-600 mb-3 font-medium">${unit.p1.desc}</p>
                        <p class="action-highlight">🎈 怎麼玩：${unit.p1.action}</p>
                        ${unit.p1.tip ? `<div class="tip-box">💡 爸媽小提醒：${unit.p1.tip}</div>` : ''}
                    </div>

                    <div class="phase-card">
                        <div class="phase-title text-sky-600">
                            <span class="step-tag bg-phase-2">2. 聽聽故事</span> ${unit.p2.title}
                            <span class="ml-auto text-xs font-bold text-sky-500 bg-sky-50 px-2 py-1 rounded-full">⏱️ ${unit.p2.time}</span>
                        </div>
                        <p class="text-slate-600 mb-3 font-medium">${unit.p2.desc}</p>
                        <p class="action-highlight">🧸 動作示範：${unit.p2.action}</p>
                        ${unit.p2.dialogue ? `<div class="dialogue-text">💬 幼兒對話：${unit.p2.dialogue}</div>` : ''}
                    </div>

                    <div class="phase-card">
                        <div class="phase-title text-emerald-600">
                            <span class="step-tag bg-phase-3">3. 動動手腳</span> ${unit.p3.title}
                            <span class="ml-auto text-xs font-bold text-emerald-500 bg-emerald-50 px-2 py-1 rounded-full">⏱️ ${unit.p3.time}</span>
                        </div>
                        <p class="text-slate-600 mb-3 font-medium">${unit.p3.desc}</p>
                        <p class="action-highlight">🖐️ 互動操作：${unit.p3.action}</p>
                        ${unit.p3.tip ? `<div class="tip-box text-emerald-900 border-emerald-400 bg-emerald-50">💡 爸媽小提醒：${unit.p3.tip}</div>` : ''}
                    </div>

                    <div class="phase-card">
                        <div class="phase-title text-indigo-600">
                            <span class="step-tag bg-phase-4">4. 抱抱禱告</span> ${unit.p4.title}
                            <span class="ml-auto text-xs font-bold text-indigo-500 bg-indigo-50 px-2 py-1 rounded-full">⏱️ ${unit.p4.time}</span>
                        </div>
                        <p class="text-slate-600 mb-3 font-medium">${unit.p4.desc}</p>
                        <div class="dialogue-text bg-white p-3 rounded-lg border">🙏 帶領短禱：<br><span class="text-lg font-bold text-indigo-600 mt-1 block">${unit.p4.dialogue}</span></div>
                        ${unit.p4.tip ? `<div class="tip-box text-indigo-900 border-indigo-400 bg-indigo-50">💡 爸媽小提醒：${unit.p4.tip}</div>` : ''}
                    </div>
                </div>
            `;
            container.appendChild(card);
        });

        function toggleUnit(el) {
            const isActive = el.classList.contains('active');
            
            // 如果希望一次只打開一個，可以取消下方兩行的註解
            // document.querySelectorAll('.unit-card').forEach(card => card.classList.remove('active'));
            
            if (!isActive) el.classList.add('active');
            else el.classList.remove('active');
            
            if (!isActive) {
                setTimeout(() => {
                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }, 300);
            }
        }
    </script>
</body>
</html>
